<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Семейное дерево</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2EDE3;--bg2:#FAF7F0;--bg3:#EAE4D6;--bg4:#DDD6C5;
  --ink:#2C2416;--ink2:#6B5D4A;--ink3:#9E8E78;
  --gold:#8B6914;--gold2:#C9A96E;--gold3:#F0E0B8;
  --red:#8B2020;--border:#D4C9B0;--border2:#B8A880;
  --cw:164px;--ch:150px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);}

#lock{position:fixed;inset:0;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:20px;padding:24px;}
.li{font-size:40px;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.lh{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;letter-spacing:.05em;color:var(--ink);text-align:center;}
.ls{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);margin-top:-12px;}
.lw{position:relative;width:100%;max-width:280px;}
.lw input{width:100%;padding:14px 46px 14px 18px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:8px;color:var(--ink);font-size:15px;outline:none;transition:border-color .2s;}
.lw input:focus{border-color:var(--gold);}
.leye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink3);font-size:17px;}
.lbtn{width:100%;max-width:280px;padding:14px;background:var(--ink);border:none;border-radius:8px;color:#FDF9F0;font-size:13px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.lbtn:hover{background:var(--gold);}
.lerr{font-size:12px;color:var(--red);height:16px;}

#app{display:none;width:100%;height:100%;flex-direction:column;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.htitle{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--ink);white-space:nowrap;}
.hsub{font-size:10px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;}
.hr{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.btn{padding:7px 12px;border-radius:6px;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .18s;border:1.5px solid var(--border2);background:var(--bg2);color:var(--ink2);white-space:nowrap;}
.btn:hover{background:var(--bg3);border-color:var(--gold);color:var(--gold);}
.sw{position:relative;}
@media(max-width:500px){.sw{display:none;}}
.sw input{padding:7px 14px 7px 30px;background:var(--bg2);border:1.5px solid var(--border);border-radius:6px;color:var(--ink);font-size:12px;width:160px;outline:none;transition:border-color .2s;}
.sw input:focus{border-color:var(--gold);}
.sic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:12px;pointer-events:none;}

.cw{flex:1;overflow:hidden;position:relative;cursor:grab;touch-action:none;}
.cw.grabbing{cursor:grabbing;}
#canvas{position:absolute;transform-origin:0 0;}
#svgl{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}

/* gen labels */
.glabel{position:absolute;left:-60px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);background:var(--bg2);padding:2px 6px;border-radius:4px;border:1px solid var(--border);pointer-events:none;white-space:nowrap;transform:translateY(50%);}

.card{position:absolute;width:var(--cw);background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .18s,box-shadow .2s;user-select:none;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.card:hover{border-color:var(--gold2);transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.12);z-index:5;}
.card.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(139,105,20,.18),0 6px 22px rgba(0,0,0,.12);z-index:20;}
.card.dim{opacity:.14;}
.ctop{display:flex;align-items:center;gap:10px;padding:12px 12px 6px;}
.cphoto{width:68px;height:68px;object-fit:cover;border-radius:50%;border:2.5px solid var(--border2);flex-shrink:0;display:block;}
.cph{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg3);font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--ink3);border:2px solid var(--border);flex-shrink:0;}
.cbody{padding:0 12px 10px;}
.cname{font-family:'Cormorant Garamond',serif;font-size:14px;line-height:1.25;color:var(--ink);font-weight:700;}
.csub{font-size:10px;color:var(--gold);letter-spacing:.02em;margin-top:1px;font-style:italic;}
.cyr{font-size:10px;color:var(--ink3);margin-top:2px;}

#panel{position:fixed;right:0;top:0;bottom:0;width:min(300px,100vw);background:var(--bg2);border-left:1.5px solid var(--border);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;z-index:100;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.1);}
#panel.open{transform:translateX(0);}
.phead{padding:18px 18px 14px;border-bottom:1px solid var(--border);position:relative;}
.pclose{position:absolute;right:12px;top:12px;background:none;border:none;color:var(--ink3);font-size:24px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.pclose:hover{background:var(--bg3);}
.pimg{width:100%;height:150px;object-fit:cover;border-radius:8px;margin-bottom:10px;background:var(--bg3);}
.pimgph{width:100%;height:110px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:8px;margin-bottom:10px;font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--ink3);}
.pname{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--ink);line-height:1.2;}
.psub{font-size:11px;color:var(--gold);margin-top:3px;font-style:italic;}
.pmeta{font-size:11px;color:var(--ink3);margin-top:4px;}
.pbody{padding:14px 18px;display:flex;flex-direction:column;gap:12px;flex:1;}
.lbl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;display:block;}
.val{font-size:13px;color:var(--ink);line-height:1.5;}
.kins{display:flex;flex-direction:column;gap:5px;}
.kin{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg3);border-radius:7px;border:1px solid var(--border);cursor:pointer;transition:border-color .2s,background .15s;}
.kin:hover{border-color:var(--gold2);background:var(--gold3);}
.kav{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg4);}
.kavph{width:32px;height:32px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--ink3);flex-shrink:0;}
.kname{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.krole{font-size:10px;color:var(--ink3);}
.hdiv{border:none;border-top:1px solid var(--border);}

.zc{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;z-index:40;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.zb{padding:8px 14px;background:none;border:none;color:var(--ink2);cursor:pointer;font-size:16px;transition:all .15s;}
.zb:hover{background:var(--bg3);color:var(--gold);}
.zl{padding:8px 10px;font-size:11px;color:var(--ink3);min-width:50px;text-align:center;line-height:2.2;border-left:1px solid var(--border);border-right:1px solid var(--border);}

#loading{position:fixed;inset:0;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:500;}
.spin{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.stxt{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);}

#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--ink);color:#FDF9F0;padding:8px 20px;border-radius:6px;font-size:12px;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
</style>
</head>
<body>
<div id="lock">
  <div class="li">🌿</div>
  <div class="lh">Семейное Дерево</div>
  <div class="ls">Авдюховы · Модовы</div>
  <div class="lw">
    <input type="password" id="pwd" placeholder="Пароль" onkeydown="if(event.key==='Enter')unlock()">
    <button class="leye" onclick="toggleEye()">👁</button>
  </div>
  <button class="lbtn" onclick="unlock()">Войти</button>
  <div class="lerr" id="lerr"></div>
</div>
<div id="loading" style="display:none"><div class="spin"></div><div class="stxt">Загрузка…</div></div>
<div id="app">
  <div class="hdr">
    <div><div class="htitle">🌿 Авдюховы · Модовы</div><div class="hsub">Семейное древо</div></div>
    <div class="hr">
      <div class="sw"><span class="sic">🔍</span><input id="search" type="text" placeholder="Поиск…" oninput="doSearch(this.value)"></div>
      <button class="btn" onclick="loadData()">↺ Обновить</button>
      <button class="btn" onclick="resetView()">⌂</button>
    </div>
  </div>
  <div class="cw" id="wrap"><div id="canvas"><svg id="svgl"></svg></div></div>
  <div class="zc">
    <button class="zb" onclick="zoom(-0.12)">−</button>
    <div class="zl" id="zlbl">80%</div>
    <button class="zb" onclick="zoom(0.12)">+</button>
  </div>
</div>
<div id="panel">
  <div class="phead">
    <button class="pclose" onclick="closePanel()">×</button>
    <div id="pp"></div>
    <div class="pname" id="pn"></div>
    <div class="psub" id="ps"></div>
    <div class="pmeta" id="pm"></div>
  </div>
  <div class="pbody">
    <div id="pnw" style="display:none"><span class="lbl">Заметки</span><div class="val" id="pnotes"></div></div>
    <hr class="hdiv">
    <div><span class="lbl">Родственники</span><div class="kins" id="pkin"></div></div>
  </div>
</div>
<div id="toast"></div>

<script>
const PASSWORD = '1901';
// Прямая публичная CSV-ссылка (скопирована из "Опубликовать в интернете")
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQgYk_YVLHzKeXrpKg32hryCRRyKqZqtvNBafNhtyqpgt_4Zf-2SnsN-PgMx8LDpxt5YhlSPg5EtTQM/pub?gid=0&single=true&output=csv';

// ── FALLBACK данные ─────────────────────────────────────────
// [id, name, maiden, yr, died, city, photo, notes, fid, mid, gen]
const FB = [
  ["va", "Владимир Авдюхов",   "",           "","","",            "","","","",  0],
  ["na", "Нина Авдюхова",      "Щербинина",  "","","",            "","","","",  0],
  ["vb", "Виктор Борисов",     "",           "","","",            "","","","",  0],
  ["ms", "Маргарита Борисова", "Сафина",     "","","",            "","","","",  0],
  ["bp", "Борис Паулин",       "",           "","","",            "","","","",  0],
  ["np", "Наталья Паулина",    "неизвестна", "","","",            "","","","",  0],
  ["da", "Дмитрий Авдюхов",   "",           "","","Н.Новгород",  "","","va","na",1],
  ["aa", "Алексей Авдюхов",   "",           "","","",            "","","va","na",1],
  ["eb", "Елена Авдюхова",    "Борисова",   "1969","","Н.Новгород","","","vb","ms",1],
  ["vvb","Владимир Борисов",  "",           "","","",            "","","vb","ms",1],
  ["mb", "Маша Борисова",     "неизвестна", "","","",            "","","","",   1],
  ["ep", "Эльвира Модова",    "Паулина",    "1963","","",         "","","bp","np",1],
  ["vp", "Владимир Паулин",   "",           "","","",            "","","bp","np",1],
  ["sm", "Сергей Модов",      "",           "","","Пермь",       "","","","",   1],
  ["sa", "Александр Авдюхов","",           "1991","","Н.Новгород","","","da","eb",2],
  ["dm", "Дарья Авдюхова",   "Модова",     "1989","","Пермь",    "","","sm","ep",2],
  ["mm", "Михаил Модов",     "",           "1989","","",          "","","sm","ep",2],
  ["ab", "Аня Борисова",     "",           "","","",             "","","vvb","mb",2],
  ["kb", "Катя Борисова",    "",           "","","",             "","","vvb","mb",2],
  ["dp", "Дима Паулин",      "",           "","","",             "","","vp","",  2],
  ["tr", "Тристан",          "",           "","","Франция",      "","","","",   2],
  ["tim","Тимур Авдюхов",    "",           "2023","","Н.Новгород","","Сын Александра и Дарьи ✦","sa","dm",3],
  ["le", "Лея",              "",           "","","Франция",      "","","tr","ab",3],
  ["vi", "Вика",             "",           "","","Франция",      "","","tr","ab",3],
];

let people=[], marriages=[];
let selId=null;
let scale=0.8, panX=0, panY=0;
const CW=164, CH=150, HGAP=44, VGAP=96;

// ── LOCK ───────────────────────────────────────────────────
function unlock(){
  const v=document.getElementById('pwd').value;
  if(v===PASSWORD){
    document.getElementById('lock').style.display='none';
    document.getElementById('loading').style.display='flex';
    document.getElementById('app').style.display='flex';
    loadData();
  } else {
    const e=document.getElementById('lerr');
    e.textContent='Неверный пароль';
    setTimeout(()=>e.textContent='',2500);
    const i=document.getElementById('pwd');
    i.style.borderColor='#8B2020';
    setTimeout(()=>i.style.borderColor='',1000);
  }
}
function toggleEye(){const i=document.getElementById('pwd');i.type=i.type==='password'?'text':'password';}

// ── LOAD ───────────────────────────────────────────────────
async function loadData(){
  document.getElementById('loading').style.display='flex';
  let ok=false;
  try{
    const r=await fetch(CSV_URL);
    if(!r.ok)throw 0;
    const txt=await r.text();
    // Проверяем что это не HTML ошибка
    if(txt.trim().startsWith('<'))throw 0;
    const rows=parseCSV(txt);
    if(rows&&rows.length>1){
      buildFromCSV(rows);
      if(people.length>0){ok=true;toast('Данные загружены из таблицы ✦');}
    }
  }catch(e){}
  if(!ok){
    buildFallback();
    toast('Таблица недоступна — встроенные данные');
  }
  layout();
  document.getElementById('loading').style.display='none';
  render();
  centerView();
}

function parseCSV(csv){
  const rows=[];let row=[],cur='',inQ=false;
  for(let i=0;i<csv.length;i++){
    const c=csv[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur.replace(/^"|"$/g,'').replace(/""/g,'"').trim());cur='';}
    else if((c==='\n'||c==='\r')&&!inQ){
      row.push(cur.replace(/^"|"$/g,'').replace(/""/g,'"').trim());cur='';
      if(row.some(x=>x))rows.push([...row]);row=[];
    }else cur+=c;
  }
  row.push(cur.replace(/^"|"$/g,'').trim());
  if(row.some(x=>x))rows.push(row);
  return rows;
}

function ci(h,name){
  let i=h.findIndex(x=>x.trim()===name);
  if(i<0)i=h.findIndex(x=>x.trim().toLowerCase()===name.toLowerCase());
  return i;
}

function buildFromCSV(rows){
  const h=rows[0];
  const iId=ci(h,'ID'), iName=ci(h,'Имя'), iSub=ci(h,'Девичья фамилия'),
        iYr=ci(h,'Год рождения'), iDied=ci(h,'Год смерти'), iCity=ci(h,'Город'),
        iPhoto=ci(h,'Ссылка на фото'), iNotes=ci(h,'Заметки'),
        iFid=ci(h,'ID Отца'), iMid=ci(h,'ID Матери'), iGen=ci(h,'Поколение (0,1,2…)');
  people=rows.slice(1).filter(r=>(r[iId]||'').trim()).map(r=>({
    id:(r[iId]||'').trim(),
    name:(r[iName]||'').trim()||'—',
    sub:(r[iSub]||'').trim(),
    yr:(r[iYr]||'').trim(),
    died:(r[iDied]||'').trim(),
    city:(r[iCity]||'').trim(),
    photo:(r[iPhoto]||'').trim(),
    notes:(r[iNotes]||'').trim(),
    fid:(r[iFid]||'').trim(),
    mid:(r[iMid]||'').trim(),
    genHint: iGen>=0 ? parseInt(r[iGen]||'')||null : null,
  }));
  marriages=inferMarriages(people);
}

function buildFallback(){
  people=FB.map(r=>({id:r[0],name:r[1],sub:r[2],yr:r[3],died:r[4],city:r[5],photo:r[6],notes:r[7],fid:r[8],mid:r[9],genHint:r[10]}));
  marriages=inferMarriages(people);
}

function inferMarriages(pp){
  const seen=new Map();
  pp.forEach(p=>{
    if(!p.fid||!p.mid)return;
    const key=[p.fid,p.mid].sort().join('|');
    if(!seen.has(key))seen.set(key,{a:p.fid,b:p.mid});
  });
  return[...seen.values()];
}

function layout(){
  if(!people.length)return;
  const ids=new Set(people.map(p=>p.id));
  // 1. Глубина
  const depth={};
  people.forEach(p=>{ if(p.genHint!=null) depth[p.id]=p.genHint; });
  let changed=true,iter=0;
  while(changed&&iter<30){
    changed=false;iter++;
    people.forEach(p=>{
      if(depth[p.id]!=null)return;
      const hasFid=p.fid&&ids.has(p.fid), hasMid=p.mid&&ids.has(p.mid);
      if(!hasFid&&!hasMid){depth[p.id]=0;changed=true;return;}
      const fd=hasFid?depth[p.fid]:null, md=hasMid?depth[p.mid]:null;
      if(hasFid&&fd==null)return;
      if(hasMid&&md==null)return;
      depth[p.id]=Math.max(fd??0,md??0)+1;changed=true;
    });
  }
  people.forEach(p=>{if(depth[p.id]==null)depth[p.id]=0;});
  const maxD=Math.max(...Object.values(depth));
  const byGen=Array.from({length:maxD+1},()=>[]);
  people.forEach(p=>byGen[depth[p.id]].push(p.id));
  // 2. Пары супругов
  const coupleOf={};
  people.forEach(p=>{
    if(!p.fid||!p.mid)return;
    coupleOf[p.fid]=p.mid;
    coupleOf[p.mid]=p.fid;
  });
  // 3. Расстановка по поколениям
  const posX={};
  for(let d=0;d<=maxD;d++){
    const raw=[...byGen[d]];
    // Группы сиблингов по ключу "fid|mid"
    const sibGroups=new Map();
    const noParent=[];
    raw.forEach(id=>{
      const p=people.find(x=>x.id===id);
      const f=p.fid&&ids.has(p.fid)?p.fid:'';
      const m=p.mid&&ids.has(p.mid)?p.mid:'';
      if(!f&&!m){ noParent.push(id); return; }
      const key=[f,m].filter(Boolean).sort().join('|');
      if(!sibGroups.has(key))sibGroups.set(key,{f,m,ids:[]});
      sibGroups.get(key).ids.push(id);
    });
    // Сортируем группы по X родителей
    const sortedGroups=[...sibGroups.values()].sort((a,b)=>{
      const axA=(posX[a.f]??posX[a.m]??0);
      const axB=(posX[b.f]??posX[b.m]??0);
      return axA-axB;
    });
    const placed=new Set();
    const ordered=[];
    const addWithSpouse=(id)=>{
      if(placed.has(id))return;
      placed.add(id);
      ordered.push(id);
      const partner=coupleOf[id];
      if(partner&&depth[partner]===d&&!placed.has(partner)){
        placed.add(partner);
        ordered.push(partner);
      }
    };
    // Внутри группы сиблингов: сначала одиночки, потом пары
    sortedGroups.forEach(g=>{
      const withoutSpouse=g.ids.filter(id=>!coupleOf[id]||depth[coupleOf[id]]!==d);
      const withSpouse=g.ids.filter(id=>coupleOf[id]&&depth[coupleOf[id]]===d);
      withoutSpouse.forEach(id=>addWithSpouse(id));
      withSpouse.forEach(id=>addWithSpouse(id));
    });
    noParent.forEach(id=>addWithSpouse(id));
    raw.forEach(id=>addWithSpouse(id));
    // Расставляем по X
    let cursor=80;
    ordered.forEach(id=>{
      const ch=people.filter(x=>(x.fid===id||x.mid===id)&&posX[x.id]!=null);
      const want=ch.length ? ch.reduce((s,c)=>s+posX[c.id],0)/ch.length : null;
      const x=want!=null ? Math.max(cursor,want) : cursor;
      posX[id]=x;
      cursor=x+CW+HGAP;
    });
  }
  // 4. Применяем
  people.forEach(p=>{
    p.x=Math.round(posX[p.id]??80);
    p.y=Math.round(depth[p.id]*(CH+VGAP));
  });
  window._byGen=byGen; window._maxGen=maxD; window._depth=depth;
}
// ── RENDER ─────────────────────────────────────────────────
function render(){
  const canvas=document.getElementById('canvas');
  canvas.querySelectorAll('.card,.glabel').forEach(e=>e.remove());
  drawSVG();
  people.forEach(p=>makeCard(p));
  // Метки поколений
  if(window._byGen){
    const genNames=['Прадеды','Дедушки · Бабушки','Родители','Дети','Внуки','Правнуки'];
    for(let d=0;d<=window._maxGen;d++){
      const lbl=document.createElement('div');
      lbl.className='glabel';
      lbl.textContent=genNames[d]||`Поколение ${d}`;
      lbl.style.top=(d*(CH+VGAP)+CH/2-10)+'px';
      canvas.appendChild(lbl);
    }
  }
  applyT();
}

function centerView(){
  if(!people.length)return;
  const wrap=document.getElementById('wrap');
  const W=wrap.clientWidth, H=wrap.clientHeight;
  const xs=people.map(p=>p.x), ys=people.map(p=>p.y);
  const treeW=Math.max(...xs)+CW-Math.min(...xs);
  const treeH=Math.max(...ys)+CH-Math.min(...ys);
  const minX=Math.min(...xs), minY=Math.min(...ys);
  const sx=(W-40)/treeW, sy=(H-80)/treeH;
  scale=Math.min(sx,sy,1);
  // Центрируем по горизонтали
  panX=(W-treeW*scale)/2 - minX*scale;
  panY=30 - minY*scale;
  applyT();
}

function gdrive(url){
  if(!url)return'';
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return`https://drive.google.com/uc?export=view&id=${m[1]}`;
  return url;
}
function ini(name){return(name||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();}

function makeCard(p){
  const canvas=document.getElementById('canvas');
  const el=document.createElement('div');
  el.className='card'+(p.id===selId?' sel':'');
  el.id='c-'+p.id;
  el.style.left=p.x+'px';
  el.style.top=p.y+'px';
  const iv=ini(p.name);
  const src=gdrive(p.photo);
  const yr=p.yr?(p.died?p.yr+'–'+p.died:'р. '+p.yr):'';
  el.innerHTML=`<div class="ctop">`
    +(src
      ?`<img class="cphoto" src="${src}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="cph" style="display:none">${iv}</div>`
      :`<div class="cph">${iv}</div>`)
    +`<div style="min-width:0">
        <div class="cname">${p.name}</div>
        ${p.sub?`<div class="csub">${p.sub}</div>`:''}
      </div></div>
    <div class="cbody">
      ${yr||p.city?`<div class="cyr">${[yr,p.city].filter(Boolean).join(' · ')}</div>`:''}
    </div>`;
  el.addEventListener('click',()=>selectP(p.id));
  canvas.appendChild(el);
}

function drawSVG(){
  const svg=document.getElementById('svgl');svg.innerHTML='';
  const pm={};people.forEach(p=>pm[p.id]=p);
  const drawn=new Set();

  // Линии супругов
  marriages.forEach(m=>{
    const pa=pm[m.a],pb=pm[m.b];if(!pa||!pb)return;
    const key=[m.a,m.b].sort().join('=');if(drawn.has(key))return;drawn.add(key);
    const L=pa.x<pb.x?pa:pb,R=pa.x<pb.x?pb:pa;
    const x1=L.x+CW,y1=L.y+CH*.38,x2=R.x,y2=R.y+CH*.38;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y1);
    line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('stroke','rgba(139,105,20,0.42)');
    line.setAttribute('stroke-width','1.8');
    line.setAttribute('stroke-dasharray','6,4');
    svg.appendChild(line);
    const mx=(x1+x2)/2,my2=(y1+y2)/2;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',mx);t.setAttribute('y',my2+5);
    t.setAttribute('text-anchor','middle');t.setAttribute('font-size','12');
    t.setAttribute('fill','rgba(139,105,20,0.45)');t.textContent='♥';
    svg.appendChild(t);
  });

  // Линии родитель→ребёнок
  // Если у ребёнка два родителя — линии от обоих сходятся в точку jx,jy и оттуда одна кривая к ребёнку
  // Если один родитель — обычная кривая
  people.forEach(p=>{
    const pf=p.fid&&pm[p.fid]?pm[p.fid]:null;
    const pm2=p.mid&&pm[p.mid]?pm[p.mid]:null;
    const x2=p.x+CW/2, y2=p.y;

    if(pf&&pm2){
      // Точка слияния — середина по X между родителями, на полпути по Y
      const jx=(pf.x+CW/2+pm2.x+CW/2)/2;
      const jy=(Math.max(pf.y,pm2.y)+CH+y2)/2;

      // От папы до точки слияния
      const x1f=pf.x+CW/2, y1f=pf.y+CH;
      const pathF=document.createElementNS('http://www.w3.org/2000/svg','path');
      pathF.setAttribute('d',`M${x1f},${y1f} C${x1f},${jy} ${jx},${jy} ${jx},${jy}`);
      pathF.setAttribute('fill','none');
      pathF.setAttribute('stroke','rgba(139,105,20,0.25)');
      pathF.setAttribute('stroke-width','1.8');
      svg.appendChild(pathF);

      // От мамы до точки слияния
      const x1m=pm2.x+CW/2, y1m=pm2.y+CH;
      const pathM=document.createElementNS('http://www.w3.org/2000/svg','path');
      pathM.setAttribute('d',`M${x1m},${y1m} C${x1m},${jy} ${jx},${jy} ${jx},${jy}`);
      pathM.setAttribute('fill','none');
      pathM.setAttribute('stroke','rgba(139,105,20,0.25)');
      pathM.setAttribute('stroke-width','1.8');
      svg.appendChild(pathM);

      // От точки слияния к ребёнку
      const pathC=document.createElementNS('http://www.w3.org/2000/svg','path');
      pathC.setAttribute('d',`M${jx},${jy} C${jx},${(jy+y2)/2} ${x2},${(jy+y2)/2} ${x2},${y2}`);
      pathC.setAttribute('fill','none');
      pathC.setAttribute('stroke','rgba(139,105,20,0.28)');
      pathC.setAttribute('stroke-width','1.8');
      svg.appendChild(pathC);

    } else {
      // Один родитель — обычная кривая
      const par=pf||pm2;if(!par)return;
      const x1=par.x+CW/2,y1=par.y+CH,my=(y1+y2)/2;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke','rgba(139,105,20,0.28)');
      path.setAttribute('stroke-width','1.8');
      svg.appendChild(path);
    }
  });
}

// ── PANEL ──────────────────────────────────────────────────
function selectP(id){
  selId=id;
  document.querySelectorAll('.card').forEach(el=>el.classList.toggle('sel',el.id==='c-'+id));
  openPanel(id);
}
function openPanel(id){
  const p=people.find(x=>x.id===id);if(!p)return;
  const iv=ini(p.name),src=gdrive(p.photo);
  document.getElementById('pp').innerHTML=src
    ?`<img class="pimg" src="${src}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="pimgph" style="display:none">${iv}</div>`
    :`<div class="pimgph">${iv}</div>`;
  document.getElementById('pn').textContent=p.name;
  document.getElementById('ps').textContent=p.sub?`урождённая ${p.sub}`:'';
  const yr=p.yr?(p.died?p.yr+'–'+p.died:'р. '+p.yr):'';
  document.getElementById('pm').textContent=[yr,p.city].filter(Boolean).join(' · ');
  const nw=document.getElementById('pnw');
  if(p.notes){nw.style.display='block';document.getElementById('pnotes').textContent=p.notes;}else nw.style.display='none';
  const pm2={};people.forEach(x=>pm2[x.id]=x);
  const kl=document.getElementById('pkin');kl.innerHTML='';
  const addK=(person,role)=>{
    if(!person)return;
    const iv2=ini(person.name),src2=gdrive(person.photo);
    const d=document.createElement('div');d.className='kin';
    d.innerHTML=(src2?`<img class="kav" src="${src2}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="kavph" style="display:none">${iv2}</div>`:`<div class="kavph">${iv2}</div>`)
      +`<div style="min-width:0"><div class="kname">${person.name}</div><div class="krole">${role}</div></div>`;
    d.onclick=()=>{selectP(person.id);goTo(person.id);};kl.appendChild(d);
  };
  if(p.fid)addK(pm2[p.fid],'Отец');
  if(p.mid)addK(pm2[p.mid],'Мать');
  people.filter(x=>x.fid===p.id||x.mid===p.id).forEach(c=>addK(c,'Ребёнок'));
  marriages.forEach(m=>{
    if(m.a===p.id&&pm2[m.b])addK(pm2[m.b],'Супруг(а)');
    if(m.b===p.id&&pm2[m.a])addK(pm2[m.a],'Супруг(а)');
  });
  people.filter(x=>x.id!==p.id&&((p.fid&&x.fid===p.fid)||(p.mid&&x.mid===p.mid))).forEach(s=>addK(s,'Брат/Сестра'));
  if(!kl.children.length)kl.innerHTML='<div style="font-size:12px;color:var(--ink3)">Нет данных</div>';
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');selId=null;
  document.querySelectorAll('.card').forEach(el=>el.classList.remove('sel'));
}
function goTo(id){
  const p=people.find(x=>x.id===id);if(!p)return;
  const w=document.getElementById('wrap');
  panX=w.clientWidth/2-(p.x+CW/2)*scale;
  panY=w.clientHeight/2-(p.y+CH/2)*scale;
  applyT();
}
function doSearch(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(el=>{
    const id=el.id.replace('c-','');
    const p=people.find(x=>x.id===id);if(!p)return;
    el.classList.toggle('dim',!!q&&!p.name.toLowerCase().includes(q)&&!(p.sub||'').toLowerCase().includes(q));
  });
}

// ── PAN & ZOOM ─────────────────────────────────────────────
(()=>{
  const w=document.getElementById('wrap');
  let pn=false,sx=0,sy=0,opx=0,opy=0;
  w.addEventListener('mousedown',e=>{
    if(e.target.closest('.card'))return;
    pn=true;sx=e.clientX;sy=e.clientY;opx=panX;opy=panY;w.classList.add('grabbing');
  });
  window.addEventListener('mousemove',e=>{if(!pn)return;panX=opx+(e.clientX-sx);panY=opy+(e.clientY-sy);applyT();});
  window.addEventListener('mouseup',()=>{pn=false;w.classList.remove('grabbing');});
  w.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY>0?-0.1:0.1);},{passive:false});
  let t1=null,initDist=0,initScale=1,t1pan=null;
  w.addEventListener('touchstart',e=>{
    if(e.touches.length===1){t1pan={x:e.touches[0].clientX,y:e.touches[0].clientY,px:panX,py:panY};}
    else if(e.touches.length===2){
      t1=true;
      initDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      initScale=scale;
    }
  },{passive:true});
  w.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&t1pan&&!t1){
      panX=t1pan.px+(e.touches[0].clientX-t1pan.x);
      panY=t1pan.py+(e.touches[0].clientY-t1pan.y);
      applyT();
    } else if(e.touches.length===2&&initDist){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      scale=Math.max(0.1,Math.min(3,initScale*(d/initDist)));applyT();
    }
  },{passive:false});
  w.addEventListener('touchend',()=>{t1=null;t1pan=null;});
})();

function zoom(d){scale=Math.max(0.1,Math.min(3,scale+d));applyT();}
function resetView(){centerView();}
function applyT(){
  document.getElementById('canvas').style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zlbl').textContent=Math.round(scale*100)+'%';
}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',3000);
}
document.getElementById('wrap').addEventListener('click',e=>{
  if(!e.target.closest('.card')&&selId)closePanel();
});
</script>
