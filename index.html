<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Семейное дерево Авдюховых · Модовых</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0d0b; --bg2:#181411; --bg3:#221d19; --bg4:#2c2520;
  --gold:#c9a96e; --gold2:#e8cc94; --gold3:#a07840; --gold4:#6b4e25;
  --text:#f0e8d8; --text2:#a09080; --text3:#6a5a48;
  --border:rgba(201,169,110,0.18); --border2:rgba(201,169,110,0.4);
  --female:rgba(180,110,140,0.18); --female-b:rgba(180,110,140,0.45);
  --male:rgba(80,130,190,0.15); --male-b:rgba(80,130,190,0.4);
  --card-w:154px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}

/* ── LOCK ── */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:22px;}
.lock-icon{font-size:44px;color:var(--gold);animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
.lock-h{font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.12em;color:var(--text);text-align:center;}
.lock-sub{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--text2);margin-top:-14px;}
.lock-wrap{position:relative;width:272px;}
.lock-wrap input{width:100%;padding:13px 44px 13px 18px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:'Jost',sans-serif;font-size:15px;outline:none;transition:border-color .25s;}
.lock-wrap input:focus{border-color:var(--gold);}
.lock-eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text2);font-size:17px;line-height:1;}
.lock-btn{width:272px;padding:13px;background:linear-gradient(135deg,var(--gold4),var(--gold3));border:none;border-radius:4px;color:var(--text);font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.lock-btn:hover{opacity:.85;}
.lock-err{font-size:12px;color:#c0604a;height:16px;letter-spacing:.04em;}

/* ── APP ── */
#app{display:none;width:100%;height:100vh;flex-direction:column;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:.1em;color:var(--gold2);}
.hdr-sub{font-size:11px;color:var(--text2);letter-spacing:.15em;margin-top:1px;}
.hdr-actions{display:flex;gap:8px;align-items:center;}
.btn{padding:7px 14px;border-radius:3px;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;border:1px solid var(--border2);background:transparent;color:var(--gold);}
.btn:hover{background:var(--bg3);border-color:var(--gold);}
.btn.primary{background:var(--gold4);border-color:var(--gold4);color:var(--text);}
.btn.primary:hover{background:var(--gold3);}
.search-wrap{position:relative;}
.search-wrap input{padding:7px 14px 7px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Jost',sans-serif;font-size:12px;width:200px;outline:none;transition:border-color .2s,width .3s;}
.search-wrap input:focus{border-color:var(--gold);width:240px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;pointer-events:none;}

/* ── CANVAS ── */
.canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab;}
.canvas-wrap.grabbing{cursor:grabbing;}
#canvas{position:absolute;transform-origin:0 0;}
#svg-layer{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}

/* ── CARDS ── */
.person-card{
  position:absolute;width:var(--card-w);
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
  cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;
  user-select:none;
}
.person-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:5;}
.person-card.selected{border-color:var(--gold2);box-shadow:0 0 0 2px rgba(201,169,110,.3),0 8px 28px rgba(0,0,0,.5);z-index:20;}
.person-card.highlight{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(232,204,148,.25);}
.card-photo{width:100%;height:90px;object-fit:cover;display:block;background:var(--bg4);}
.card-photo-placeholder{width:100%;height:90px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--text3);}
.card-body{padding:8px 10px 9px;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:14px;line-height:1.25;color:var(--text);font-weight:600;}
.card-maiden{font-size:10px;color:var(--gold3);letter-spacing:.04em;margin-top:1px;}
.card-year{font-size:10px;color:var(--text2);margin-top:3px;letter-spacing:.04em;}

/* ── PANEL ── */
#panel{position:fixed;right:0;top:0;bottom:0;width:310px;background:var(--bg2);border-left:1px solid var(--border);padding:0;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;z-index:50;display:flex;flex-direction:column;}
#panel.open{transform:translateX(0);}
.panel-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
.panel-close{position:absolute;right:14px;top:14px;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1;padding:2px;}
.panel-close:hover{color:var(--text);}
.panel-photo{width:100%;height:160px;object-fit:cover;border-radius:6px;margin-bottom:12px;background:var(--bg4);}
.panel-photo-ph{width:100%;height:120px;display:flex;align-items:center;justify-content:center;background:var(--bg4);border-radius:6px;margin-bottom:12px;font-family:'Cormorant Garamond',serif;font-size:52px;color:var(--text3);}
.panel-name{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold2);line-height:1.2;}
.panel-maiden{font-size:12px;color:var(--gold3);margin-top:2px;letter-spacing:.04em;}
.panel-meta{font-size:12px;color:var(--text2);margin-top:5px;letter-spacing:.04em;}
.panel-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px;flex:1;}
.field-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text2);margin-bottom:5px;display:block;}
.field-val{font-size:14px;color:var(--text);line-height:1.5;}
.kin-list{display:flex;flex-direction:column;gap:6px;}
.kin-item{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg3);border-radius:5px;border:1px solid var(--border);cursor:pointer;transition:border-color .2s;}
.kin-item:hover{border-color:var(--gold);}
.kin-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg4);}
.kin-avatar-ph{width:32px;height:32px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text3);flex-shrink:0;}
.kin-info{min-width:0;}
.kin-name{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kin-role{font-size:10px;color:var(--text2);letter-spacing:.08em;}
.divider{border:none;border-top:1px solid var(--border);}

/* ── ZOOM ── */
.zoom-ctrl{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;z-index:40;}
.zoom-btn{padding:8px 14px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px;transition:all .15s;}
.zoom-btn:hover{background:var(--bg3);color:var(--gold);}
.zoom-lbl{padding:8px 10px;font-size:11px;color:var(--text2);min-width:50px;text-align:center;line-height:2.2;}

/* ── LEGEND ── */
.legend{position:fixed;bottom:20px;left:20px;font-size:11px;color:var(--text2);z-index:40;line-height:2;}
.legend span{display:inline-block;width:22px;height:2px;vertical-align:middle;margin-right:5px;}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:500;}
.loading-spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);}

/* ── TOAST ── */
#toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--gold2);padding:9px 22px;border-radius:4px;font-size:12px;letter-spacing:.1em;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;}

/* ── SHEET HINT ── */
.sheet-hint{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:8px 18px;border-radius:4px;font-size:12px;letter-spacing:.06em;z-index:60;text-align:center;display:none;}
.sheet-hint a{color:var(--gold);text-decoration:none;}
.sheet-hint a:hover{text-decoration:underline;}
</style>
</head>

<div id="lock">

    <button class="lock-eye" onclick="toggleEye()">👁</button>
  </div>
  <button class="lock-btn" onclick="unlock()">Войти</button>
  <div class="lock-err" id="lerr"></div>
</div>

<div id="loading" style="display:none;">
  <div class="loading-spinner"></div>
  <div class="loading-txt">Загрузка данных…</div>
</div>

<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-title">✦ Авдюховы · Модовы</div>
      <div class="hdr-sub">Семейное древо</div>
    </div>
    <div class="hdr-actions">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Поиск…" oninput="doSearch(this.value)">
      </div>
      <button class="btn" onclick="showSheetHint()">📋 Таблица</button>
      <button class="btn" onclick="loadData()">↺ Обновить</button>
      <button class="btn" onclick="resetView()">⌂</button>
    </div>
  </div>
  <div class="sheet-hint" id="sheet-hint">

  </div>
  <div class="canvas-wrap" id="canvas-wrap">
    <div id="canvas">

    </div>
  </div>
  <div class="zoom-ctrl">

    <div class="zoom-lbl" id="zoom-lbl">100%</div>
    <button class="zoom-btn" onclick="zoom(0.15)">+</button>
  </div>
  <div class="legend">
    <span style="background:rgba(201,169,110,0.5)"></span>Родитель–ребёнок&nbsp;&nbsp;
    <span style="background:rgba(201,169,110,0.8);border-top:1px dashed var(--gold)"></span>Супруги
  </div>
</div>

<div id="panel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">×</button>
    <div id="ph-photo"></div>
    <div class="panel-name" id="ph-name"></div>
    <div class="panel-maiden" id="ph-maiden"></div>
    <div class="panel-meta" id="ph-meta"></div>
  </div>
  <div class="panel-body">
    <div id="ph-notes-wrap" style="display:none">
      <span class="field-lbl">Заметки</span>
      <div class="field-val" id="ph-notes"></div>
    </div>
    <hr class="divider">
    <div>
      <span class="field-lbl">Родственники</span>
      <div class="kin-list" id="ph-kin"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let people = [], marriages = [];
let selectedId = null;
let scale = 0.85, panX = 60, panY = 40;
const CW = 154, CH = 148; // card width / height
const HGAP = 36, VGAP = 70;

// ════════════════════════════════════════════════
//  LOCK
// ════════════════════════════════════════════════
function unlock(){
  const v = document.getElementById('pwd').value;
  const err = document.getElementById('lerr');
  if(v === PASSWORD){
    document.getElementById('lock').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('app').style.display = 'flex';
    loadData();
  } else {
    err.textContent = 'Неверный пароль';
    setTimeout(()=>err.textContent='', 2500);
    document.getElementById('pwd').style.borderColor='#c0604a';
    setTimeout(()=>document.getElementById('pwd').style.borderColor='', 1000);
  }
}
function toggleEye(){
  const i = document.getElementById('pwd');
  i.type = i.type==='password'?'text':'password';
}

// ════════════════════════════════════════════════
//  DATA LOADING (Google Sheets публичный CSV или fallback)
// ════════════════════════════════════════════════
async function loadData(){
  if(SHEET_ID === 'ВСТАВЬТЕ_ID_ВАШЕЙ_ТАБЛИЦЫ'){
    // Нет таблицы — используем встроенные данные
    people = BUILT_IN_PEOPLE.map(p=>({...p}));
    marriages = BUILT_IN_MARRIAGES.map(m=>({...m}));
    finishLoad();
    return;
  }
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;
  try {
    const res = await fetch(url);
    if(!res.ok) throw new Error();
    const csv = await res.text();
    parseCSV(csv);
    finishLoad();
  } catch(e){
    // fallback
    people = BUILT_IN_PEOPLE.map(p=>({...p}));
    marriages = BUILT_IN_MARRIAGES.map(m=>({...m}));
    finishLoad();
    toast('Таблица недоступна — загружены встроенные данные');
  }
}

function parseCSV(csv){
  const lines = csv.trim().split('\n').map(l=>l.split(',').map(c=>c.replace(/^"|"$/g,'').trim()));
  const [header, ...rows] = lines;
  const idx = k => header.indexOf(k);
  people = rows.filter(r=>r[idx('Id')]).map(r=>({
    id:     r[idx('Id')] || '',
    pid:    r[idx('Perent ID')] || r[idx('Pid')] || '',
    name:   r[idx('Name')] || r[idx('Title ')] || '',
    maiden: r[idx('Subtitle')] || '',
    year:   r[idx('Year')] || r[idx('Год')] || '',
    city:   r[idx('City')] || '',
    photo:  r[idx('Photo URL')] || r[idx('Node Image')] || '',
    notes:  r[idx('Content 3')] || '',
  }));
  marriages = BUILT_IN_MARRIAGES; // браки из встроенных (в таблице их нет отдельно)
}

function finishLoad(){
  document.getElementById('loading').style.display = 'none';
  layoutTree();
  renderTree();
}

// ════════════════════════════════════════════════
//  TREE LAYOUT — вертикальное дерево (Reingold-Tilford упрощённый)
// ════════════════════════════════════════════════
function buildChildMap(){
  const map = {};
  people.forEach(p=>{
    map[p.id] = [];
  });
  people.forEach(p=>{
    if(!p.pid) return;
    const pids = p.pid.split(/[;,\s]+/).filter(Boolean);
    pids.forEach(pid=>{
      if(map[pid]) map[pid].push(p.id);
    });
  });
  return map;
}

function layoutTree(){
  const childMap = buildChildMap();
  // find roots (no parent or parent not in our set)
  const ids = new Set(people.map(p=>p.id));
  const roots = people.filter(p=>{
    if(!p.pid) return true;
    const pids = p.pid.split(/[;,\s]+/).filter(Boolean);
    return !pids.some(pid=>ids.has(pid));
  }).map(p=>p.id);

  // BFS assign depth
  const depth = {}, visited = new Set();
  const queue = roots.map(r=>({id:r,d:0}));
  while(queue.length){
    const {id,d} = queue.shift();
    if(visited.has(id)) continue;
    visited.add(id);
    depth[id] = d;
    (childMap[id]||[]).forEach(cid=>queue.push({id:cid,d:d+1}));
  }
  // unvisited nodes get depth 0
  people.forEach(p=>{ if(depth[p.id]===undefined) depth[p.id]=0; });

  const maxDepth = Math.max(...Object.values(depth));
  const byDepth = {};
  for(let d=0; d<=maxDepth; d++) byDepth[d]=[];
  people.forEach(p=>byDepth[depth[p.id]].push(p.id));

  // assign x positions — pack by depth level
  const posMap = {};
  for(let d=0; d<=maxDepth; d++){
    const row = byDepth[d];
    row.forEach((id,i)=>{
      posMap[id] = { x: i*(CW+HGAP), y: d*(CH+VGAP) };
    });
  }

  // apply positions to people
  people.forEach(p=>{
    const pos = posMap[p.id] || {x:0,y:0};
    p.x = pos.x;
    p.y = pos.y;
  });
}

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
function renderTree(){
  const canvas = document.getElementById('canvas');
  canvas.querySelectorAll('.person-card').forEach(e=>e.remove());
  drawSVG();
  people.forEach(p=>renderCard(p));
  applyTransform();
}

function renderCard(p){
  const canvas = document.getElementById('canvas');
  const el = document.createElement('div');
  el.className = 'person-card' + (p.id===selectedId?' selected':'');
  el.id = 'card-'+p.id;
  el.style.left = p.x+'px';
  el.style.top  = p.y+'px';

  const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  // photo
  let photoHtml = '';
  if(p.photo){
    // convert Google Drive share link → direct embed
    const src = gdriveUrl(p.photo);
    photoHtml = `<img class="card-photo" src="${src}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="">
      <div class="card-photo-placeholder" style="display:none">${initials}</div>`;
  } else {
    photoHtml = `<div class="card-photo-placeholder">${initials}</div>`;
  }

  el.innerHTML = `${photoHtml}
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      ${p.maiden?`<div class="card-maiden">${p.maiden}</div>`:''}
      ${p.year?`<div class="card-year">${p.year}${p.city?' · '+p.city:''}</div>`:''}
    </div>`;

  el.addEventListener('click', ()=>selectPerson(p.id));
  makeDraggable(el, p);
  canvas.appendChild(el);
}

function gdriveUrl(url){
  // Google Drive: https://drive.google.com/file/d/ID/view → https://drive.google.com/uc?id=ID
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)\//);
  if(m) return `https://drive.google.com/uc?id=${m[1]}`;
  // Yandex Disk: оставляем как есть (прямые ссылки работают)
  return url;
}

function drawSVG(){
  const svg = document.getElementById('svg-layer');
  svg.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);

  const drawn = new Set();
  const pmap = {};
  people.forEach(p=>pmap[p.id]=p);

  // parent → child lines
  people.forEach(p=>{
    if(!p.pid) return;
    const pids = p.pid.split(/[;,\s]+/).filter(Boolean);
    pids.forEach(pid=>{
      const par = pmap[pid];
      if(!par) return;
      const key = [pid,p.id].join('-');
      if(drawn.has(key)) return;
      drawn.add(key);
      // from bottom of parent to top of child
      const x1 = par.x + CW/2, y1 = par.y + CH;
      const x2 = p.x + CW/2,   y2 = p.y;
      const my = (y1+y2)/2;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke','rgba(201,169,110,0.35)');
      path.setAttribute('stroke-width','1.2');
      svg.appendChild(path);
    });
  });

  // spouse lines (horizontal dashed)
  marriages.forEach(m=>{
    const pa = pmap[m.a], pb = pmap[m.b];
    if(!pa||!pb) return;
    const key = [m.a,m.b].sort().join('=');
    if(drawn.has(key)) return;
    drawn.add(key);
    const x1 = pa.x + CW, y1 = pa.y + CH/2;
    const x2 = pb.x,      y2 = pb.y + CH/2;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y1);
    line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('stroke','rgba(201,169,110,0.55)');
    line.setAttribute('stroke-width','1.2');
    line.setAttribute('stroke-dasharray','5,3');
    svg.appendChild(line);
  });
}

// ════════════════════════════════════════════════
//  INTERACTIONS
// ════════════════════════════════════════════════
function selectPerson(id){
  selectedId = id;
  document.querySelectorAll('.person-card').forEach(el=>{
    el.classList.toggle('selected', el.id==='card-'+id);
  });
  openPanel(id);
}

function openPanel(id){
  const p = people.find(x=>x.id===id);
  if(!p) return;
  const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  // photo
  const phPhoto = document.getElementById('ph-photo');
  if(p.photo){
    const src = gdriveUrl(p.photo);
    phPhoto.innerHTML = `<img class="panel-photo" src="${src}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="">
      <div class="panel-photo-ph" style="display:none">${initials}</div>`;
  } else {
    phPhoto.innerHTML = `<div class="panel-photo-ph">${initials}</div>`;
  }

  document.getElementById('ph-name').textContent = p.name;
  document.getElementById('ph-maiden').textContent = p.maiden||'';
  const meta = [p.year, p.city].filter(Boolean).join(' · ');
  document.getElementById('ph-meta').textContent = meta;

  const notesWrap = document.getElementById('ph-notes-wrap');
  if(p.notes){
    notesWrap.style.display='block';
    document.getElementById('ph-notes').textContent = p.notes;
  } else {
    notesWrap.style.display='none';
  }

  // kin
  const kinList = document.getElementById('ph-kin');
  kinList.innerHTML = '';
  const pmap = {};
  people.forEach(x=>pmap[x.id]=x);

  const addKin = (person, role) => {
    if(!person) return;
    const ini = person.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const div = document.createElement('div');
    div.className = 'kin-item';
    const src = person.photo ? gdriveUrl(person.photo) : '';
    div.innerHTML = src
      ? `<img class="kin-avatar" src="${src}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="kin-avatar-ph" style="display:none">${ini}</div>`
      : `<div class="kin-avatar-ph">${ini}</div>`;
    div.innerHTML += `<div class="kin-info"><div class="kin-name">${person.name}</div><div class="kin-role">${role}</div></div>`;
    div.addEventListener('click', ()=>{ selectPerson(person.id); scrollToCard(person.id); });
    kinList.appendChild(div);
  };

  // parents
  if(p.pid){
    p.pid.split(/[;,\s]+/).filter(Boolean).forEach(pid=>{
      if(pmap[pid]) addKin(pmap[pid], 'Родитель');
    });
  }
  // children
  people.filter(x=>{
    if(!x.pid) return false;
    return x.pid.split(/[;,\s]+/).includes(p.id);
  }).forEach(c=>addKin(c,'Ребёнок'));
  // spouses
  marriages.forEach(m=>{
    if(m.a===p.id && pmap[m.b]) addKin(pmap[m.b],'Супруг(а)');
    if(m.b===p.id && pmap[m.a]) addKin(pmap[m.a],'Супруг(а)');
  });

  if(!kinList.children.length) kinList.innerHTML = '<div style="font-size:12px;color:var(--text2)">Нет данных</div>';
  document.getElementById('panel').classList.add('open');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  selectedId = null;
  document.querySelectorAll('.person-card').forEach(el=>el.classList.remove('selected'));
}

function scrollToCard(id){
  const p = people.find(x=>x.id===id);
  if(!p) return;
  const wrap = document.getElementById('canvas-wrap');
  panX = wrap.clientWidth/2 - (p.x + CW/2)*scale;
  panY = wrap.clientHeight/2 - (p.y + CH/2)*scale;
  applyTransform();
}

// Search
function doSearch(q){
  q = q.toLowerCase().trim();
  document.querySelectorAll('.person-card').forEach(el=>{
    const id = el.id.replace('card-','');
    const p = people.find(x=>x.id===id);
    if(!p) return;
    const match = !q || p.name.toLowerCase().includes(q) || (p.maiden||'').toLowerCase().includes(q) || (p.city||'').toLowerCase().includes(q);
    el.classList.toggle('highlight', !!q && match);
    el.style.opacity = q && !match ? '0.25' : '1';
  });
}

// ════════════════════════════════════════════════
//  DRAG CARDS
// ════════════════════════════════════════════════
function makeDraggable(el, person){
  let dragging=false, sx=0,sy=0, ox=0,oy=0, moved=false;
  el.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    dragging=true; moved=false;
    sx=e.clientX; sy=e.clientY; ox=person.x; oy=person.y;
    e.stopPropagation();
  });
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    const dx=(e.clientX-sx)/scale, dy=(e.clientY-sy)/scale;
    if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
    person.x=Math.round(ox+dx); person.y=Math.round(oy+dy);
    el.style.left=person.x+'px'; el.style.top=person.y+'px';
    drawSVG();
  });
  window.addEventListener('mouseup', ()=>{
    if(dragging && !moved){ /* click handled by click event */ }
    dragging=false;
  });
}

// ════════════════════════════════════════════════
//  PAN & ZOOM
// ════════════════════════════════════════════════
(()=>{
  const wrap = document.getElementById('canvas-wrap');
  let panning=false, sx=0,sy=0, opx=0,opy=0;
  wrap.addEventListener('mousedown', e=>{
    if(e.target.closest('.person-card')) return;
    panning=true; sx=e.clientX; sy=e.clientY; opx=panX; opy=panY;
    wrap.classList.add('grabbing');
  });
  window.addEventListener('mousemove', e=>{
    if(!panning) return;
    panX=opx+(e.clientX-sx); panY=opy+(e.clientY-sy);
    applyTransform();
  });
  window.addEventListener('mouseup', ()=>{ panning=false; wrap.classList.remove('grabbing'); });
  wrap.addEventListener('wheel', e=>{
    e.preventDefault();
    zoom(e.deltaY>0?-0.1:0.1);
  },{passive:false});
  // touch pan
  let t0=null;
  wrap.addEventListener('touchstart', e=>{ if(e.touches.length===1){ t0={x:e.touches[0].clientX,y:e.touches[0].clientY,px:panX,py:panY}; } });
  wrap.addEventListener('touchmove', e=>{ e.preventDefault(); if(t0&&e.touches.length===1){ panX=t0.px+(e.touches[0].clientX-t0.x); panY=t0.py+(e.touches[0].clientY-t0.y); applyTransform(); }},{passive:false});
})();

function zoom(d){
  scale=Math.max(0.15,Math.min(3,scale+d));
  applyTransform();
}
function resetView(){ scale=0.85; panX=60; panY=40; applyTransform(); }
function applyTransform(){
  document.getElementById('canvas').style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zoom-lbl').textContent=Math.round(scale*100)+'%';
}

// ════════════════════════════════════════════════
//  SHEET HINT
// ════════════════════════════════════════════════
function showSheetHint(){
  const hint = document.getElementById('sheet-hint');
  document.getElementById('sheet-link').href = SHEET_URL;
  hint.style.display = 'block';
  setTimeout(()=>hint.style.display='none', 8000);
}

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.style.opacity='0',3000);
}

// close panel on outside click
document.getElementById('canvas-wrap').addEventListener('click', e=>{
  if(!e.target.closest('.person-card') && selectedId){ closePanel(); }
});
</script>
