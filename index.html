<style>
:root {

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}

.lock-wrap input:focus{border-color:var(--gold);}

.lock-btn{width:272px;padding:13px;background:linear-gradient(135deg,var(--gold4),var(--gold3));border:none;border-radius:4px;color:var(--text);font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.lock-btn:hover{opacity:.85;}
.lock-err{font-size:12px;color:#c0604a;height:16px;letter-spacing:.04em;}
#app{display:none;width:100%;height:100vh;flex-direction:column;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:.1em;color:var(--gold2);}
.hdr-sub{font-size:11px;color:var(--text2);letter-spacing:.15em;margin-top:1px;}
.hdr-r{display:flex;gap:8px;align-items:center;}
.btn{padding:7px 14px;border-radius:3px;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;border:1px solid var(--border2);background:transparent;color:var(--gold);}

.srch input{padding:7px 14px 7px 30px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Jost',sans-serif;font-size:12px;width:180px;outline:none;transition:border-color .2s,width .3s;}
.srch input:focus{border-color:var(--gold);width:220px;}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:13px;pointer-events:none;}
.canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab;}

#canvas{position:absolute;transform-origin:0 0;}
#svg-layer{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}
.person-card{position:absolute;width:var(--card-w);background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;user-select:none;}

.person-card.selected{border-color:var(--gold2);box-shadow:0 0 0 2px rgba(201,169,110,.3);z-index:20;}

// ══════════════════════════════════════════
let people=[], marriages=[];

// ══════════════════════════════════════════
// LOCK
// ══════════════════════════════════════════
function unlock(){
  const v=document.getElementById('pwd').value;
  const err=document.getElementById('lerr');
  if(v===PASSWORD){
    document.getElementById('lock').style.display='none';
    document.getElementById('loading').style.display='flex';
    document.getElementById('app').style.display='flex';
    loadData();
  } else {
    err.textContent='Неверный пароль';
    setTimeout(()=>err.textContent='',2500);
    const i=document.getElementById('pwd');
    i.style.borderColor='#c0604a';
    setTimeout(()=>i.style.borderColor='',1000);
  }
}
function toggleEye(){
  const i=document.getElementById('pwd');
  i.type=i.type==='password'?'text':'password';
}

// ══════════════════════════════════════════
// DATA — читаем CSV через публичную pub-ссылку
// ══════════════════════════════════════════
async function loadData(){
  document.getElementById('loading').style.display='flex';
  try {
    // pub?output=csv работает без CORS для публично опубликованных таблиц
    const res = await fetch(SHEET_CSV_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const csv = await res.text();
    const parsed = parseCSV(csv);
    if(parsed && parsed.length > 0){
      people = parsed;
      marriages = DEFAULT_MARRIAGES;
      toast('Данные загружены из таблицы ✦');
    } else {
      throw new Error('empty');
    }
  } catch(e){
    people = DEFAULT_PEOPLE.map(p=>({...p}));
    marriages = DEFAULT_MARRIAGES.map(m=>({...m}));
    toast('Таблица пока недоступна — показаны встроенные данные');
  }
  document.getElementById('loading').style.display='none';
  layoutTree();
  renderTree();
}

function parseCSV(csv){
  // Разбиваем CSV аккуратно — учитываем кавычки
  const rows = [];
  let cur='', inQ=false;
  const cells=[];
  const pushCell=()=>{cells.push(cur.replace(/^"|"$/g,'').replace(/""/g,'"').trim());cur='';};
  for(let i=0;i<csv.length;i++){
    const c=csv[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){pushCell();}
    else if((c==='\n'||c==='\r')&&!inQ){
      pushCell();
      if(cells.some(x=>x))rows.push([...cells]);
      cells.length=0;
    } else {cur+=c;}
  }
  pushCell();
  if(cells.some(x=>x))rows.push([...cells]);
  if(rows.length<2)return null;

  const header=rows[0];
  const idx=k=>{
    const i=header.findIndex(h=>h.trim()===k.trim());
    return i>=0?i:header.findIndex(h=>h.trim().toLowerCase()===k.trim().toLowerCase());
  };

  // Определяем индексы — поддерживаем оба варианта названий столбцов
  const iId    = idx('Id');
  const iPid   = idx('Perent ID')>=0 ? idx('Perent ID') : idx('Pid');
  const iName  = idx('Name')>=0 ? idx('Name') : idx('Title');
  const iSub   = idx('Subtitle');
  const iYr    = idx('Year')>=0 ? idx('Year') : idx('Год');
  const iCity  = idx('City');
  const iPhoto = idx('Photo URL')>=0 ? idx('Photo URL') : idx('Node Image');
  const iNotes = idx('Notes')>=0 ? idx('Notes') : idx('Content 3');

  const result=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const id=(r[iId]||'').trim();
    if(!id)continue;
    result.push({
      id,
      pid:  (r[iPid]||'').trim(),
      name: (r[iName]||'').trim() || id,
      sub:  (r[iSub]||'').trim(),
      yr:   (r[iYr]||'').trim(),
      city: (r[iCity]||'').trim(),
      photo:(r[iPhoto]||'').trim(),
      notes:(r[iNotes]||'').trim(),
    });
  }
  return result;
}

// ══════════════════════════════════════════
// LAYOUT — вертикальное дерево
// ══════════════════════════════════════════
function buildChildMap(){
  const map={};
  people.forEach(p=>{map[p.id]=[];});
  people.forEach(p=>{
    if(!p.pid)return;
    p.pid.split(/[;,\s]+/).filter(Boolean).forEach(pid=>{
      if(map[pid])map[pid].push(p.id);
    });
  });
  return map;
}

function layoutTree(){
  const childMap=buildChildMap();
  const ids=new Set(people.map(p=>p.id));
  const roots=people.filter(p=>{
    if(!p.pid)return true;
    return !p.pid.split(/[;,\s]+/).filter(Boolean).some(pid=>ids.has(pid));
  }).map(p=>p.id);

  const depth={};
  const q=roots.map(r=>({id:r,d:0}));
  const vis=new Set();
  while(q.length){
    const {id,d}=q.shift();
    if(vis.has(id))continue;
    vis.add(id);depth[id]=d;
    (childMap[id]||[]).forEach(c=>q.push({id:c,d:d+1}));
  }
  people.forEach(p=>{if(depth[p.id]===undefined)depth[p.id]=0;});

  const maxD=Math.max(...Object.values(depth));
  const byD={};
  for(let d=0;d<=maxD;d++)byD[d]=[];
  people.forEach(p=>byD[depth[p.id]].push(p.id));

  // Центрируем детей под родителями
  const posMap={};
  // Первый проход — позиции слева направо
  for(let d=0;d<=maxD;d++){
    byD[d].forEach((id,i)=>{posMap[id]={x:i*(CW+HG),y:d*(CH+VG)};});
  }

  people.forEach(p=>{
    const pos=posMap[p.id]||{x:0,y:0};
    p.x=pos.x; p.y=pos.y;
  });
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderTree(){
  const canvas=document.getElementById('canvas');
  canvas.querySelectorAll('.person-card').forEach(e=>e.remove());
  drawSVG();
  people.forEach(p=>makeCard(p));
  applyT();
}

function gdrive(url){
  if(!url)return'';
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return`https://drive.google.com/uc?export=view&id=${m[1]}`;
  return url;
}

function initials(name){
  return name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
}

function makeCard(p){
  const canvas=document.getElementById('canvas');
  const el=document.createElement('div');
  el.className='person-card'+(p.id===selId?' selected':'');
  el.id='card-'+p.id;
  el.style.left=p.x+'px';
  el.style.top=p.y+'px';
  const ini=initials(p.name);
  const src=gdrive(p.photo);
  el.innerHTML=(src
    ?`<img class="card-photo" src="${src}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="card-ph" style="display:none">${ini}</div>`
    :`<div class="card-ph">${ini}</div>`)
    +`<div class="card-body">
        <div class="card-name">${p.name}</div>
        ${p.sub?`<div class="card-sub">${p.sub}</div>`:''}
        ${p.yr?`<div class="card-yr">${p.yr}${p.city?' · '+p.city:''}</div>`:''}
      </div>`;
  el.addEventListener('click',()=>selectP(p.id));
  drag(el,p);
  canvas.appendChild(el);
}

function drawSVG(){
  const svg=document.getElementById('svg-layer');
  svg.innerHTML='';
  const pm={};people.forEach(p=>pm[p.id]=p);
  const drawn=new Set();

  // Родитель → ребёнок
  people.forEach(p=>{
    if(!p.pid)return;
    p.pid.split(/[;,\s]+/).filter(Boolean).forEach(pid=>{
      const par=pm[pid];if(!par)return;
      const key=pid+'>'+p.id;if(drawn.has(key))return;drawn.add(key);
      const x1=par.x+CW/2, y1=par.y+CH;
      const x2=p.x+CW/2,   y2=p.y;
      const my=(y1+y2)/2;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke','rgba(201,169,110,0.32)');
      path.setAttribute('stroke-width','1.2');
      svg.appendChild(path);
    });
  });

  // Супруги
  marriages.forEach(m=>{
    const pa=pm[m.a],pb=pm[m.b];if(!pa||!pb)return;
    const key=[m.a,m.b].sort().join('=');if(drawn.has(key))return;drawn.add(key);
    const x1=pa.x+CW,y1=pa.y+CH*0.45;
    const x2=pb.x,  y2=pb.y+CH*0.45;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y1);
    line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('stroke','rgba(201,169,110,0.5)');
    line.setAttribute('stroke-width','1.2');
    line.setAttribute('stroke-dasharray','5,3');
    svg.appendChild(line);
  });
}

// ══════════════════════════════════════════
// PANEL
// ══════════════════════════════════════════
function selectP(id){
  selId=id;
  document.querySelectorAll('.person-card').forEach(el=>el.classList.toggle('selected',el.id==='card-'+id));
  openPanel(id);
}

function openPanel(id){
  const p=people.find(x=>x.id===id);if(!p)return;
  const ini=initials(p.name);
  const src=gdrive(p.photo);
  const pp=document.getElementById('pp');
  pp.innerHTML=src
    ?`<img class="ph-img" src="${src}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="ph-img-ph" style="display:none">${ini}</div>`
    :`<div class="ph-img-ph">${ini}</div>`;
  document.getElementById('pn').textContent=p.name;
  document.getElementById('ps').textContent=p.sub||'';
  document.getElementById('pm').textContent=[p.yr,p.city].filter(Boolean).join(' · ');
  const nw=document.getElementById('pnw');
  if(p.notes){nw.style.display='block';document.getElementById('pnotes').textContent=p.notes;}
  else nw.style.display='none';

  const pm2={};people.forEach(x=>pm2[x.id]=x);
  const kinList=document.getElementById('pkin');
  kinList.innerHTML='';
  const addKin=(person,role)=>{
    if(!person)return;
    const ini2=initials(person.name);
    const src2=gdrive(person.photo);
    const d=document.createElement('div');d.className='kin';
    d.innerHTML=(src2
      ?`<img class="kin-av" src="${src2}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="kin-av-ph" style="display:none">${ini2}</div>`
      :`<div class="kin-av-ph">${ini2}</div>`)
      +`<div style="min-width:0"><div class="kin-name">${person.name}</div><div class="kin-role">${role}</div></div>`;
    d.onclick=()=>{selectP(person.id);scrollTo(person.id);};
    kinList.appendChild(d);
  };
  if(p.pid)p.pid.split(/[;,\s]+/).filter(Boolean).forEach(pid=>addKin(pm2[pid],'Родитель'));
  people.filter(x=>x.pid&&x.pid.split(/[;,\s]+/).includes(p.id)).forEach(c=>addKin(c,'Ребёнок'));
  marriages.forEach(m=>{
    if(m.a===p.id)addKin(pm2[m.b],'Супруг(а)');
    if(m.b===p.id)addKin(pm2[m.a],'Супруг(а)');
  });
  if(!kinList.children.length)kinList.innerHTML='<div style="font-size:12px;color:var(--text2)">Нет данных</div>';
  document.getElementById('panel').classList.add('open');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  selId=null;
  document.querySelectorAll('.person-card').forEach(el=>el.classList.remove('selected'));
}

function scrollTo(id){
  const p=people.find(x=>x.id===id);if(!p)return;
  const w=document.getElementById('wrap');
  panX=w.clientWidth/2-(p.x+CW/2)*scale;
  panY=w.clientHeight/2-(p.y+CH/2)*scale;
  applyT();
}

function doSearch(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('.person-card').forEach(el=>{
    const id=el.id.replace('card-','');
    const p=people.find(x=>x.id===id);if(!p)return;
    const match=!q||p.name.toLowerCase().includes(q)||(p.sub||'').toLowerCase().includes(q)||(p.city||'').toLowerCase().includes(q);
    el.classList.toggle('dim',!!q&&!match);
  });
}

// ══════════════════════════════════════════
// DRAG
// ══════════════════════════════════════════
function drag(el,p){
  let dn=false,sx=0,sy=0,ox=0,oy=0,mv=false;
  el.addEventListener('mousedown',e=>{if(e.button!==0)return;dn=true;mv=false;sx=e.clientX;sy=e.clientY;ox=p.x;oy=p.y;e.stopPropagation();});
  window.addEventListener('mousemove',e=>{
    if(!dn)return;
    const dx=(e.clientX-sx)/scale,dy=(e.clientY-sy)/scale;
    if(Math.abs(dx)>3||Math.abs(dy)>3)mv=true;
    p.x=Math.round(ox+dx);p.y=Math.round(oy+dy);
    el.style.left=p.x+'px';el.style.top=p.y+'px';
    drawSVG();
  });
  window.addEventListener('mouseup',()=>{dn=false;});
}

// ══════════════════════════════════════════
// PAN & ZOOM
// ══════════════════════════════════════════
(()=>{
  const w=document.getElementById('wrap');
  let pn2=false,sx=0,sy=0,opx=0,opy=0;
  w.addEventListener('mousedown',e=>{if(e.target.closest('.person-card'))return;pn2=true;sx=e.clientX;sy=e.clientY;opx=panX;opy=panY;w.classList.add('grabbing');});
  window.addEventListener('mousemove',e=>{if(!pn2)return;panX=opx+(e.clientX-sx);panY=opy+(e.clientY-sy);applyT();});
  window.addEventListener('mouseup',()=>{pn2=false;w.classList.remove('grabbing');});
  w.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY>0?-0.1:0.1);},{passive:false});
  let t0=null;
  w.addEventListener('touchstart',e=>{if(e.touches.length===1)t0={x:e.touches[0].clientX,y:e.touches[0].clientY,px:panX,py:panY};});
  w.addEventListener('touchmove',e=>{e.preventDefault();if(t0&&e.touches.length===1){panX=t0.px+(e.touches[0].clientX-t0.x);panY=t0.py+(e.touches[0].clientY-t0.y);applyT();}},{passive:false});
})();

function zoom(d){scale=Math.max(0.15,Math.min(3,scale+d));applyT();}
function resetView(){scale=0.85;panX=60;panY=40;applyT();}
function applyT(){
  document.getElementById('canvas').style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zlbl').textContent=Math.round(scale*100)+'%';
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',3500);
}

document.getElementById('wrap').addEventListener('click',e=>{
  if(!e.target.closest('.person-card')&&selId)closePanel();
});
</script>
</body>
</html>
